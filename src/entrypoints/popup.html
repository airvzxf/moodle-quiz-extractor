<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>moodle-quiz-extractor</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        font-size: 14px;
      }
      body {
        min-width: 320px;
        margin: 0;
        padding: 16px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.3);
      }
      .tab {
        background: transparent;
        border: none;
        padding: 6px 10px;
        font: inherit;
        color: inherit;
        cursor: pointer;
        border-bottom: 2px solid transparent;
      }
      .tab[aria-selected='true'] {
        border-bottom-color: #2d6cdf;
        font-weight: 600;
      }
      .tab[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel[data-active='true'] {
        display: block;
      }
      .status {
        margin: 8px 0 12px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(127, 127, 127, 0.12);
        font-size: 12px;
        line-height: 1.4;
      }
      .status[data-state='busy'] {
        background: rgba(64, 160, 255, 0.18);
      }
      .status[data-state='error'] {
        background: rgba(220, 64, 64, 0.18);
      }
      .status[data-state='ok'] {
        background: rgba(64, 200, 120, 0.18);
      }
      textarea {
        display: block;
        width: 100%;
        min-height: 140px;
        margin: 4px 0;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: transparent;
        color: inherit;
        font: inherit;
        box-sizing: border-box;
        resize: vertical;
      }
      button {
        display: block;
        width: 100%;
        margin: 4px 0;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }
      button.primary {
        background: #2d6cdf;
        color: white;
        border-color: #2d6cdf;
      }
      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      footer {
        margin-top: 12px;
        font-size: 11px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>Moodle Quiz Extractor</h1>
    <div role="tablist" class="tabs">
      <button class="tab" role="tab" id="tab-extract" aria-selected="true" data-tab="extract">
        Extraer
      </button>
      <button class="tab" role="tab" id="tab-autofill" aria-selected="false" data-tab="autofill">
        Autocompletar
      </button>
      <button class="tab" role="tab" id="tab-diagnostics" aria-selected="false" data-tab="diagnostics" disabled>
        Diagnóstico
      </button>
      <button class="tab" role="tab" id="tab-settings" aria-selected="false" data-tab="settings" disabled>
        Configuración (Fase 5)
      </button>
    </div>

    <div class="status" id="status" data-state="idle">Cargando…</div>

    <section class="tab-panel" id="panel-extract" data-tab="extract" data-active="true">
      <button id="extract-current" type="button">Extraer página actual</button>
      <button id="download-zip" class="primary" type="button" disabled>
        Descargar ZIP
      </button>
    </section>

    <section class="tab-panel" id="panel-autofill" data-tab="autofill">
      <label for="answers-input" style="font-size: 12px; opacity: 0.8;">
        Una respuesta por línea (1. a) / 2. a,c / 3. texto).
      </label>
      <textarea
        id="answers-input"
        placeholder="1. a)&#10;2. c)&#10;3. a,c&#10;4. Mi respuesta…"
        spellcheck="false"
      ></textarea>
      <button id="autofill-validate" type="button">Validar respuestas</button>
      <button id="autofill-apply" class="primary" type="button" disabled>
        Aplicar respuestas
      </button>
      <button id="autofill-cancel" type="button" disabled>Cancelar</button>
    </section>

    <section class="tab-panel" id="panel-diagnostics" data-tab="diagnostics">
      <p style="font-size: 12px; opacity: 0.7;">Diagnóstico (Fase 4).</p>
    </section>

    <section class="tab-panel" id="panel-settings" data-tab="settings">
      <p style="font-size: 12px; opacity: 0.7;">Configuración (diferida a Fase 5).</p>
    </section>

    <footer>
      Local-first — sin envío a terceros. v0.3.0.
    </footer>
    <script type="module" src="../popup/main.ts"></script>
  </body>
</html>
